[build]
  publish = "."           # 静态文件发布目录
  functions = "netlify/functions"

[[headers]]
  for = "/*"
    [headers.values]
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/.netlify/functions/*"
    [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# 确保 SPA 路由
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
